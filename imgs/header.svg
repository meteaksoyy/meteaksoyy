<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1">
        <animate attributeName="stop-color" values="#6366f1;#06b6d4;#a855f7;#6366f1" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#a855f7;#6366f1;#06b6d4" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <style>
    .name  { font: 800 68px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; fill: url(#grad); }
    .sub   { font: 400 24px 'Cascadia Code', 'Fira Code', Consolas, monospace; fill: #8b949e; }
    .brace { font: 300 90px 'Cascadia Code', Consolas, monospace; fill: #30363d; }
    .fade  { opacity: 0; animation: fadein 1.2s ease-out forwards; }
    .fade2 { opacity: 0; animation: fadein 1.2s ease-out 0.6s forwards; }
    @keyframes fadein { to { opacity: 1; } }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <text x="150" y="140" text-anchor="middle" class="brace fade">{</text>
  <text x="750" y="140" text-anchor="middle" class="brace fade">}</text>

  <text x="450" y="118" text-anchor="middle" class="name fade">Mete Aksoy</text>
  <text x="450" y="172" text-anchor="middle" class="sub fade2">software engineer · tu delft graduate</text>
  <rect x="728" y="154" width="11" height="22" fill="#06b6d4" class="cursor fade2"/>
</svg>
